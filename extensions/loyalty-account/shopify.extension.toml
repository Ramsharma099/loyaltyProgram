# Learn more about configuring your customer account UI extension:
# https://shopify.dev/docs/api/customer-account-ui-extensions/latest/configuration

api_version = "2026-04"

[[extensions]]
name = "loyalty-account"
handle = "loyalty-account"
type = "ui_extension"
uid = "8ea3c599-0904-df5e-db42-642a579c982e53dc2001"

[[extensions.targeting]]
module = "./src/OrderIndex.jsx"
target = "customer-account.order-index.block.render"
default_placement = "ORDER_INDEX"

[[extensions.targeting]]
module = "./src/Profile.jsx"
target = "customer-account.profile.block.render"
default_placement = "PROFILE1"

[extensions.capabilities]
api_access = true
network_access = true

[extensions.settings]
[[extensions.settings.fields]]
key = "accountRenderMode"
type = "single_line_text_field"
name = "Customer account render mode"
description = "Use native for the built-in customer account UI, or iframe_link to show a link to the iframe wallet."

[[extensions.settings.fields]]
key = "accountIframeButtonText"
type = "single_line_text_field"
name = "Iframe wallet button text"
description = "Button/link text for opening the iframe wallet from the customer account block."

[[extensions.settings.fields]]
key = "accountIframeDescription"
type = "single_line_text_field"
name = "Iframe wallet description"
description = "Description shown above the iframe wallet link."

[[extensions.settings.fields]]
key = "accountLoginMessage"
type = "single_line_text_field"
name = "Login message"
description = "Message shown when the customer is not signed in."

[[extensions.settings.fields]]
key = "accountBalanceTitle"
type = "single_line_text_field"
name = "Balance section title"
description = "Title for the loyalty balance section."

[[extensions.settings.fields]]
key = "accountAvailableLabel"
type = "single_line_text_field"
name = "Available points label"
description = "Label for available points display."

[[extensions.settings.fields]]
key = "accountCurrentBalance"
type = "single_line_text_field"
name = "Current balance label"
description = "Label for current balance display."

[[extensions.settings.fields]]
key = "accountStoreCreditTitle"
type = "single_line_text_field"
name = "Store credit section title"
description = "Title shown above the store credit conversion controls."

[[extensions.settings.fields]]
key = "accountConversionRateText"
type = "single_line_text_field"
name = "Conversion rate text"
description = "Store credit conversion rate. Use {points} and {amount} placeholders."

[[extensions.settings.fields]]
key = "accountCreditPreviewText"
type = "single_line_text_field"
name = "Credit preview text"
description = "Preview of the store credit customers will receive. Use {amount} placeholder."

[[extensions.settings.fields]]
key = "accountLoadingText"
type = "single_line_text_field"
name = "Loading state text"
description = "Text shown while loading."

[[extensions.settings.fields]]
key = "accountRedeemingText"
type = "single_line_text_field"
name = "Converting state text"
description = "Text shown while points are being converted to store credit."

[[extensions.settings.fields]]
key = "accountRedeemButtonText"
type = "single_line_text_field"
name = "Convert button text"
description = "Text for the store credit conversion button."

[[extensions.settings.fields]]
key = "accountDisabledMsg"
type = "single_line_text_field"
name = "Conversion disabled message"
description = "Message when store credit conversion is disabled."

[[extensions.settings.fields]]
key = "accountNotEnoughPtsMsg"
type = "single_line_text_field"
name = "Not enough points message"
description = "Message when the customer cannot convert the selected amount. Use {remaining_points} placeholder."

[[extensions.settings.fields]]
key = "accountGiftCardMsg"
type = "single_line_text_field"
name = "Store credit success message"
description = "Success message after store credit conversion. Use {amount} placeholder."

[[extensions.settings.fields]]
key = "accountErrorMsg"
type = "single_line_text_field"
name = "Conversion error message"
description = "Generic error message when store credit conversion fails."

[[extensions.settings.fields]]
key = "accountConfigErrorMsg"
type = "single_line_text_field"
name = "Configuration error message"
description = "Message shown when the loyalty API URL is missing."

[[extensions]]
name = "loyalty-reward-history"
handle = "loyalty-reward-history"
type = "ui_extension"
uid = "1c392a4b-09c7-4c37-a9f5-c5b784f7ee58"

[[extensions.targeting]]
module = "./src/RewardHistoryPage.jsx"
target = "customer-account.page.render"

[extensions.capabilities]
api_access = true
network_access = true

[extensions.settings]
[[extensions.settings.fields]]
key = "accountRenderMode"
type = "single_line_text_field"
name = "Customer account render mode"
description = "Use native for the built-in customer account UI, or iframe_link to show a link to the iframe wallet."

[[extensions.settings.fields]]
key = "accountIframeButtonText"
type = "single_line_text_field"
name = "Iframe wallet button text"
description = "Button/link text for opening the iframe wallet from the customer account page."

[[extensions.settings.fields]]
key = "accountIframeDescription"
type = "single_line_text_field"
name = "Iframe wallet description"
description = "Description shown above the iframe wallet link."

[[extensions.settings.fields]]
key = "accountLoginMessage"
type = "single_line_text_field"
name = "Login message"
description = "Message shown when the customer is not signed in."

[[extensions.settings.fields]]
key = "accountLoadingText"
type = "single_line_text_field"
name = "Loading state text"
description = "Text shown while loading."
