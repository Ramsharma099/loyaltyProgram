# Learn more about configuring your checkout UI extension:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

# The version of APIs your extension will receive. Learn more:
# https://shopify.dev/docs/api/usage/versioning
api_version = "2026-04"

[[extensions]]
name = "loyalty-checkout"
handle = "loyalty-checkout"
type = "ui_extension"
uid = "e4f5d875-ab79-4edd-e667-b6f78db2ce1f82eb47dd"

# Controls where in Shopify your extension will be injected,
# and the file that contains your extension’s source code. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/extension-targets-overview

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.checkout.block.render"
default_placement = "INFORMATION1"

[extensions.capabilities]
# Gives your extension access to directly query Shopify’s storefront API.
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#api-access
api_access = true

# Gives your extension access to make external network calls, using the
# JavaScript `fetch()` API. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#network-access
network_access = true

# Loads metafields on checkout resources, including the cart,
# products, customers, and more. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#metafields

[[extensions.metafields]]
namespace = "$app"
key = "requestedFreeGift"

# Defines settings that will be collected from merchants installing
# your extension. Learn more:
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration#settings-definition

[extensions.settings]
[[extensions.settings.fields]]
key = "api_base_url"
type = "single_line_text_field"
name = "API base URL"
description = "HTTPS URL of the app backend, for example the Shopify CLI tunnel URL."

[[extensions.settings.fields]]
key = "login_message"
type = "single_line_text_field"
name = "Login message"
description = "Message shown when customer is not logged in."

[[extensions.settings.fields]]
key = "description"
type = "single_line_text_field"
name = "Description"
description = "Description text. Use {coupon_amount} and {reward_label} placeholders."

[[extensions.settings.fields]]
key = "discount_prompt"
type = "single_line_text_field"
name = "Reward selection prompt"
description = "Prompt to select a reward. Use {reward_singular} placeholder."

[[extensions.settings.fields]]
key = "checkoutRedeemButtonText"
type = "single_line_text_field"
name = "Redeem button text"
description = "Text for the redeem button."

[[extensions.settings.fields]]
key = "checkoutRedeemingText"
type = "single_line_text_field"
name = "Redeeming state text"
description = "Text shown while redeeming is in progress."

[[extensions.settings.fields]]
key = "checkoutPointsLabel"
type = "single_line_text_field"
name = "Available points label"
description = "Label for available points display."

[[extensions.settings.fields]]
key = "checkoutSelectRewardMsg"
type = "single_line_text_field"
name = "Select reward message"
description = "Message when user needs to select a reward."

[[extensions.settings.fields]]
key = "checkoutNotEnoughPtsMsg"
type = "single_line_text_field"
name = "Not enough points message"
description = "Message when customer doesn't have enough points."

[[extensions.settings.fields]]
key = "checkoutDisabledMsg"
type = "single_line_text_field"
name = "Redemption disabled message"
description = "Message when checkout redemption is disabled."

[[extensions.settings.fields]]
key = "checkoutRedemptionTitle"
type = "single_line_text_field"
name = "Redemption section title"
description = "Title for the redeem points section."

[[extensions.settings.fields]]
key = "checkoutGiftCardMsg"
type = "single_line_text_field"
name = "Gift card success message"
description = "Success message for gift card redemption. Use {rewardCode} placeholder."

[[extensions.settings.fields]]
key = "checkoutDiscountMsg"
type = "single_line_text_field"
name = "Discount success message"
description = "Success message for discount redemption. Use {rewardCode} placeholder."

[[extensions.settings.fields]]
key = "checkoutErrorMsg"
type = "single_line_text_field"
name = "Redemption error message"
description = "Generic error message when redemption fails."

[[extensions.settings.fields]]
key = "checkoutLoadingMsg"
type = "single_line_text_field"
name = "Loading message"
description = "Message shown while loading points."

[[extensions.settings.fields]]
key = "checkoutAvailableRewardsMsg"
type = "single_line_text_field"
name = "Available rewards message"
description = "Message shown below reward list. Use {reward_count} and {reward_label} placeholders."
